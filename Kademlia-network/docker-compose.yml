name: observability-stack

networks:
  monitoring:
    driver: bridge
    ipam:
      config:
        - subnet: 172.23.0.0/16

volumes:
  prometheus_data:
  grafana_data:

include:
  - services/prometheus/index.yaml
  - services/grafana/index.yaml

x-peer-common: &peer-common
  build: .
  networks:
    monitoring:
  stdin_open: true
  tty: true

services:
  bootstrap-node:
    <<: *peer-common
    container_name: bootstrap-node
    networks:
      monitoring:
        ipv4_address: 172.23.0.2
    environment:
      - VAULT_SECRET_PASS=admin
    ports:
      - "5001:5001"
      - "9001:9001"
    command: ["java", "-cp", "/app/p2p-node.jar", "org.graph.server.LauncherBootstrap", "0.0.0.0"]
  peer-8001:
    <<: *peer-common
    container_name: peer-8001
    networks:
      monitoring:
        ipv4_address: 172.23.0.11
    environment:
      - VAULT_SECRET_PASS=admin
    ports:
      - "8001:8001"
      - "9002:9001"
    command: ["java", "-cp", "/app/p2p-node.jar", "org.graph.server.Launcher", "172.23.0.11", "8001", "172.23.0.2"]

  peer-8002:
